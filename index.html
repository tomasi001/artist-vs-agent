<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Artist vs Agent — Day 6</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;600;800;900&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --font:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --bg:#030306;
  --human:#ff2d6a;
  --ai:#00c8ff;
  --fire:#ff4400;
  --gold:#ffcc00;
  --ember:rgba(255,68,0,0.15);
}
html,body{
  font-family:var(--font);background:var(--bg);color:#fff;
  overflow:hidden;width:100%;height:100%;
  -webkit-font-smoothing:antialiased;
  cursor:default;
}
canvas#gl{position:fixed;inset:0;z-index:1}

/* ── Typography overlay ── */
#text-layer{
  position:fixed;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;pointer-events:none;
  padding:0 6vw;
}
#main-text{
  font-weight:100;font-size:clamp(1.8rem,5.5vw,4.8rem);
  line-height:1.08;letter-spacing:-0.04em;
  text-align:center;
  opacity:0;transform:scale(0.96) translateY(12px);
  transition:opacity 0.6s cubic-bezier(.22,1,.36,1),transform 0.6s cubic-bezier(.22,1,.36,1);
  will-change:opacity,transform;
  text-shadow:0 0 60px rgba(0,200,255,0.08);
}
#main-text.on{opacity:1;transform:scale(1) translateY(0)}
#main-text .h{color:var(--human)}
#main-text .a{color:var(--ai)}
#main-text .f{color:var(--fire)}
#main-text .g{color:var(--gold)}
#main-text .w{font-weight:900}
#main-text .l{font-weight:200;opacity:0.6;font-style:italic}
#main-text .num{font-family:var(--mono);font-weight:700;letter-spacing:0.05em}

#sub-text{
  font-weight:300;font-size:clamp(0.85rem,1.6vw,1.15rem);
  color:rgba(255,255,255,0.35);margin-top:14px;
  text-align:center;letter-spacing:0.02em;
  opacity:0;transition:opacity 0.4s ease 0.15s;
}
#sub-text.on{opacity:1}

/* ── VS flash ── */
#vs{
  position:fixed;inset:0;z-index:15;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
  transition:opacity 0.15s ease;
}
#vs span{
  font-family:var(--mono);font-weight:900;
  font-size:clamp(6rem,18vw,14rem);
  background:linear-gradient(135deg,var(--human),var(--fire));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 80px rgba(255,45,106,0.5));
}

/* ── Data HUD ── */
#hud{
  position:fixed;bottom:48px;left:50%;transform:translateX(-50%);
  z-index:12;pointer-events:none;
  display:flex;gap:32px;
  opacity:0;transition:opacity 0.5s ease;
}
#hud.on{opacity:1}
.ch{text-align:center}
.ch-name{
  font-family:var(--mono);font-size:10px;
  letter-spacing:0.14em;text-transform:uppercase;
  color:rgba(255,255,255,0.4);margin-bottom:10px;
}
.ch-bars{display:flex;flex-direction:column;gap:4px}
.bar{width:90px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.bar-inner{height:100%;border-radius:2px;width:0%;transition:width 1s cubic-bezier(.22,1,.36,1)}
.bar-inner.h{background:var(--human)}
.bar-inner.ai{background:var(--ai)}
.ch-legend{
  font-size:9px;color:rgba(255,255,255,0.25);
  margin-top:6px;font-family:var(--mono);letter-spacing:0.08em;
}

/* ── CTA ── */
#cta{
  position:fixed;bottom:56px;left:50%;transform:translateX(-50%);
  z-index:14;pointer-events:auto;text-align:center;
  opacity:0;transition:opacity 0.6s ease;
}
#cta.on{opacity:1}
#cta p{font-weight:300;font-size:0.95rem;color:rgba(255,255,255,0.5);margin-bottom:14px}
#cta button{
  background:none;border:1px solid var(--ai);color:var(--ai);
  padding:11px 36px;border-radius:4px;
  font-family:var(--font);font-size:13px;font-weight:400;
  letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;
  transition:all 0.3s ease;
}
#cta button:hover{background:var(--ai);color:var(--bg)}

/* ── Progress ── */
#prog{
  position:fixed;bottom:0;left:0;width:100%;height:2px;z-index:20;
  background:rgba(255,255,255,0.03);
}
#prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--human),var(--ai));
  transition:width 0.2s linear;
}

/* ── Start ── */
#start{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;background:var(--bg);cursor:pointer;
  transition:opacity 0.7s ease;
}
#start.off{opacity:0;pointer-events:none}
#start h1{
  font-weight:100;font-size:clamp(2.2rem,5vw,4.2rem);
  letter-spacing:-0.04em;
}
#start .sub{
  font-weight:300;font-size:13px;color:rgba(255,255,255,0.3);
  letter-spacing:0.12em;text-transform:uppercase;
  margin-top:20px;animation:breathe 2.5s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:0.3}50%{opacity:0.8}}
#start .day{
  font-family:var(--mono);font-weight:700;font-size:clamp(0.7rem,1.2vw,0.9rem);
  color:var(--fire);letter-spacing:0.2em;text-transform:uppercase;
  margin-bottom:12px;
}
</style>
</head>
<body>

<div id="start">
  <div class="day">Day 6</div>
  <h1>Artist vs Agent</h1>
  <div class="sub">Click anywhere to begin</div>
</div>

<canvas id="gl"></canvas>

<div id="text-layer">
  <div id="main-text"></div>
  <div id="sub-text"></div>
</div>

<div id="vs"><span>VS</span></div>

<div id="hud">
  <div class="ch">
    <div class="ch-name">Google</div>
    <div class="ch-bars">
      <div class="bar"><div class="bar-inner h" id="b-g-h"></div></div>
      <div class="bar"><div class="bar-inner ai" id="b-g-a"></div></div>
    </div>
    <div class="ch-legend">human / ai</div>
  </div>
  <div class="ch">
    <div class="ch-name">Meta</div>
    <div class="ch-bars">
      <div class="bar"><div class="bar-inner h" id="b-m-h"></div></div>
      <div class="bar"><div class="bar-inner ai" id="b-m-a"></div></div>
    </div>
    <div class="ch-legend">human / ai</div>
  </div>
  <div class="ch">
    <div class="ch-name">Email</div>
    <div class="ch-bars">
      <div class="bar"><div class="bar-inner h" id="b-e-h"></div></div>
      <div class="bar"><div class="bar-inner ai" id="b-e-a"></div></div>
    </div>
    <div class="ch-legend">human / ai</div>
  </div>
</div>

<div id="cta">
  <p>What metrics prove a brand is actually working?</p>
  <button>Comment your thoughts</button>
</div>

<div id="prog"><div id="prog-fill"></div></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

/* ═══════════════════════════════════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════════════════════════════════ */
const HUMAN = new THREE.Color(0xff2d6a);
const AI    = new THREE.Color(0x00c8ff);
const FIRE  = new THREE.Color(0xff4400);
const GOLD  = new THREE.Color(0xffcc00);
const BG    = new THREE.Color(0x030306);

/* ═══════════════════════════════════════════════════════════════════════
   RENDERER
   ═══════════════════════════════════════════════════════════════════════ */
const canvas = document.getElementById('gl');
const W = () => window.innerWidth, H = () => window.innerHeight;
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(W(), H());
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = BG.clone();

const camera = new THREE.PerspectiveCamera(55, W() / H(), 0.1, 500);
camera.position.set(0, 0, 40);

/* ═══════════════════════════════════════════════════════════════════════
   CUSTOM SHADERS — the heart of the visual experience
   ═══════════════════════════════════════════════════════════════════════ */

// ── Organic Metaball Field (vertex displacement, noise-driven) ──────
// Two competing organic forms — one human (warm), one AI (cool)
// They morph, merge, split, and battle based on the script

const FIELD_VERT = `
  uniform float uTime;
  uniform float uMorph;     // 0 = sphere, 1 = split into two masses
  uniform float uFireIntensity;
  uniform float uConverge;  // 1 = merge to centre
  uniform vec3 uHumanPos;
  uniform vec3 uAiPos;
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  varying float vFresnel;
  varying float vNoise;
  varying vec2 vUv;

  // Simplex-like noise
  vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
  vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
  vec4 perm(vec4 x){return mod289(((x*34.0)+1.0)*x);}

  float noise3(vec3 p){
    vec3 a=floor(p);vec3 d=p-a;d=d*d*(3.0-2.0*d);
    vec4 b=a.xxyy+vec4(0.0,1.0,0.0,1.0);
    vec4 k1=perm(b.xyxy);vec4 k2=perm(k1.xyxy+b.zzww);
    vec4 c=k2+a.zzzz;vec4 k3=perm(c);vec4 k4=perm(c+1.0);
    vec4 o1=fract(k3*(1.0/41.0));vec4 o2=fract(k4*(1.0/41.0));
    vec4 o3=o2*d.z+o1*(1.0-d.z);
    vec2 o4=o3.yw*d.x+o3.xz*(1.0-d.x);
    return o4.y*d.y+o4.x*(1.0-d.y);
  }

  float fbm(vec3 p){
    float v=0.0;float a=0.5;
    for(int i=0;i<5;i++){
      v+=a*noise3(p);
      p=p*2.1+vec3(1.7,9.2,4.1);
      a*=0.5;
    }
    return v;
  }

  void main(){
    vUv = uv;
    vec3 pos = position;

    // Noise displacement — organic, alive
    float n = fbm(pos * 1.2 + uTime * 0.15) * 2.0 - 1.0;
    float n2 = fbm(pos * 2.5 + uTime * 0.3 + 100.0) * 2.0 - 1.0;
    vNoise = n;

    // Morph: split into two masses
    float side = sign(pos.x + 0.001);
    vec3 offset = vec3(0.0);
    offset.x += side * uMorph * 6.0;

    // Fire: violent displacement
    float fireDisp = uFireIntensity * n2 * 3.0;
    offset.y += fireDisp * sin(uTime * 4.0 + pos.x * 2.0);
    offset.x += uFireIntensity * n * 1.5 * cos(uTime * 3.0 + pos.y);

    // Converge
    offset = mix(offset, -pos * 0.5, uConverge);

    // Organic surface displacement
    float disp = n * 0.8 + n2 * 0.3;
    vec3 displaced = pos + normal * disp + offset;

    vWorldPos = (modelMatrix * vec4(displaced, 1.0)).xyz;
    vNormal = normalize(normalMatrix * normal);

    // Fresnel
    vec3 viewDir = normalize(cameraPosition - vWorldPos);
    vFresnel = pow(1.0 - max(dot(viewDir, vNormal), 0.0), 3.0);

    gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
  }
`;

const FIELD_FRAG = `
  uniform float uTime;
  uniform float uMorph;
  uniform float uFireIntensity;
  uniform vec3 uHumanColor;
  uniform vec3 uAiColor;
  uniform vec3 uFireColor;
  uniform float uEmissive;
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  varying float vFresnel;
  varying float vNoise;
  varying vec2 vUv;

  void main(){
    // Colour based on world x-position (human left, AI right)
    float side = smoothstep(-2.0, 2.0, vWorldPos.x);
    vec3 baseColor = mix(uHumanColor, uAiColor, side);

    // Fire overlay
    baseColor = mix(baseColor, uFireColor, uFireIntensity * 0.6 * (0.5 + vNoise * 0.5));

    // Lighting
    vec3 lightDir = normalize(vec3(0.5, 1.0, 0.8));
    float diff = max(dot(vNormal, lightDir), 0.0) * 0.6 + 0.4;

    // Rim light
    vec3 rim = mix(uHumanColor, uAiColor, side) * vFresnel * 1.5;

    // Subsurface-style glow
    float sss = pow(max(dot(-vNormal, lightDir), 0.0), 2.0) * 0.3;

    vec3 col = baseColor * diff + rim + baseColor * sss;

    // Emissive pulse
    float pulse = sin(uTime * 3.0 + vWorldPos.y * 5.0) * 0.5 + 0.5;
    col += baseColor * uEmissive * pulse * 0.4;

    // Hot edges during fire
    col += uFireColor * uFireIntensity * vFresnel * 2.0;

    gl_FragColor = vec4(col, 0.92);
  }
`;

/* ═══════════════════════════════════════════════════════════════════════
   SCENE OBJECTS
   ═══════════════════════════════════════════════════════════════════════ */

// ── The organic form — a high-detail icosphere with custom shader ────
const fieldUniforms = {
  uTime:          { value: 0 },
  uMorph:         { value: 0 },
  uFireIntensity: { value: 0 },
  uConverge:      { value: 0 },
  uHumanPos:      { value: new THREE.Vector3(-6, 0, 0) },
  uAiPos:         { value: new THREE.Vector3(6, 0, 0) },
  uHumanColor:    { value: HUMAN.clone() },
  uAiColor:       { value: AI.clone() },
  uFireColor:     { value: FIRE.clone() },
  uEmissive:      { value: 0 },
};

const fieldMat = new THREE.ShaderMaterial({
  uniforms: fieldUniforms,
  vertexShader: FIELD_VERT,
  fragmentShader: FIELD_FRAG,
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: true,
});

const fieldGeom = new THREE.IcosahedronGeometry(8, 64);
const field = new THREE.Mesh(fieldGeom, fieldMat);
scene.add(field);

// ── Ember particle system — thousands of tiny glowing sparks ────────
const EMBER_COUNT = 6000;
const emberGeom = new THREE.BufferGeometry();
const ePos = new Float32Array(EMBER_COUNT * 3);
const eVel = new Float32Array(EMBER_COUNT * 3);
const ePhase = new Float32Array(EMBER_COUNT);
const eSize = new Float32Array(EMBER_COUNT);
const eSide = new Float32Array(EMBER_COUNT); // -1 human, +1 ai, 0 neutral

for (let i = 0; i < EMBER_COUNT; i++) {
  const i3 = i * 3;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(Math.random() * 2 - 1);
  const r = 8 + Math.random() * 30;
  ePos[i3]     = r * Math.sin(phi) * Math.cos(theta);
  ePos[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  ePos[i3 + 2] = r * Math.cos(phi) - 10;
  eVel[i3]     = (Math.random() - 0.5) * 0.03;
  eVel[i3 + 1] = (Math.random() - 0.5) * 0.03;
  eVel[i3 + 2] = (Math.random() - 0.5) * 0.02;
  ePhase[i] = Math.random() * Math.PI * 2;
  eSize[i] = 0.3 + Math.random() * 1.5;
  eSide[i] = i < EMBER_COUNT / 3 ? -1 : (i < EMBER_COUNT * 2 / 3 ? 1 : 0);
}
emberGeom.setAttribute('position', new THREE.BufferAttribute(ePos, 3));
emberGeom.setAttribute('aPhase', new THREE.BufferAttribute(ePhase, 1));
emberGeom.setAttribute('aSize', new THREE.BufferAttribute(eSize, 1));
emberGeom.setAttribute('aSide', new THREE.BufferAttribute(eSide, 1));

const emberMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:      { value: 0 },
    uIntensity: { value: 0.4 },
    uMorph:     { value: 0 },
    uFire:      { value: 0 },
    uConverge:  { value: 0 },
    uDataMode:  { value: 0 },
    uHumanCol:  { value: HUMAN.clone() },
    uAiCol:     { value: AI.clone() },
    uFireCol:   { value: FIRE.clone() },
  },
  vertexShader: `
    attribute float aPhase;
    attribute float aSize;
    attribute float aSide;
    uniform float uTime;
    uniform float uIntensity;
    uniform float uMorph;
    uniform float uFire;
    uniform float uConverge;
    uniform float uDataMode;
    varying vec3 vCol;
    varying float vAlpha;

    void main(){
      vec3 pos = position;

      // Breathing
      float breath = sin(uTime * 0.4 + aPhase) * 0.5 + 0.5;
      pos += normalize(pos) * breath * 1.5;

      // Morph: separate into two swarms
      if(uMorph > 0.01){
        float pull = aSide * uMorph * 10.0;
        pos.x += pull;
      }

      // Fire: chaotic upward motion
      if(uFire > 0.01){
        pos.y += sin(uTime * 5.0 + aPhase * 3.0) * uFire * 6.0;
        pos.x += cos(uTime * 4.0 + aPhase * 2.0) * uFire * 3.0;
        pos.z += sin(uTime * 3.0 + aPhase) * uFire * 2.0;
      }

      // Data mode: organise into streams
      if(uDataMode > 0.01){
        float stream = floor(aPhase * 3.0);
        float streamX = (stream - 1.0) * 12.0;
        pos.x = mix(pos.x, streamX + sin(pos.y * 0.2 + uTime) * 2.0, uDataMode);
        pos.y = mod(pos.y - uTime * 8.0, 60.0) - 30.0;
        pos.z = mix(pos.z, -5.0 + cos(aPhase * 10.0 + uTime) * 3.0, uDataMode);
      }

      // Converge
      if(uConverge > 0.01){
        pos = mix(pos, vec3(0.0, 0.0, -5.0), uConverge * 0.6);
      }

      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      gl_PointSize = aSize * uIntensity * (180.0 / -mv.z);
      gl_Position = projectionMatrix * mv;

      // Colour: side-based
      vec3 humanC = vec3(1.0, 0.176, 0.416);
      vec3 aiC = vec3(0.0, 0.784, 1.0);
      vec3 fireC = vec3(1.0, 0.267, 0.0);
      vec3 col = aSide < -0.5 ? humanC : (aSide > 0.5 ? aiC : mix(humanC, aiC, 0.5));
      col = mix(col, fireC, uFire * 0.7);

      vCol = col;
      vAlpha = uIntensity * (0.5 + breath * 0.5) * smoothstep(60.0, 5.0, length(pos));
    }
  `,
  fragmentShader: `
    varying vec3 vCol;
    varying float vAlpha;
    void main(){
      float d = length(gl_PointCoord - 0.5);
      if(d > 0.5) discard;
      float a = smoothstep(0.5, 0.05, d) * vAlpha;
      gl_FragColor = vec4(vCol, a * 0.85);
    }
  `,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
});

const embers = new THREE.Points(emberGeom, emberMat);
scene.add(embers);

// ── Data rain particles — vertical streams for metrics moments ──────
const RAIN_COUNT = 2000;
const rainGeom = new THREE.BufferGeometry();
const rPos = new Float32Array(RAIN_COUNT * 3);
const rPhase = new Float32Array(RAIN_COUNT);
const rStream = new Float32Array(RAIN_COUNT);
for (let i = 0; i < RAIN_COUNT; i++) {
  rPos[i*3]   = (Math.random()-0.5)*60;
  rPos[i*3+1] = Math.random()*60 - 30;
  rPos[i*3+2] = (Math.random()-0.5)*20 - 10;
  rPhase[i] = Math.random() * Math.PI * 2;
  rStream[i] = Math.floor(Math.random() * 3); // 0=google, 1=meta, 2=email
}
rainGeom.setAttribute('position', new THREE.BufferAttribute(rPos, 3));
rainGeom.setAttribute('aPhase', new THREE.BufferAttribute(rPhase, 1));
rainGeom.setAttribute('aStream', new THREE.BufferAttribute(rStream, 1));

const rainMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uActive: { value: 0 },
  },
  vertexShader: `
    attribute float aPhase;
    attribute float aStream;
    uniform float uTime;
    uniform float uActive;
    varying float vAlpha;
    varying vec3 vCol;
    void main(){
      vec3 pos = position;
      // Three vertical streams
      float streamX = (aStream - 1.0) * 14.0;
      pos.x = mix(pos.x, streamX + sin(uTime * 0.5 + aPhase) * 3.0, uActive);
      pos.y = mod(pos.y - uTime * 12.0, 60.0) - 30.0;
      pos.z = mix(pos.z, -8.0, uActive * 0.5);
      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      float size = mix(0.3, 1.8, uActive);
      gl_PointSize = size * (120.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
      // Stream colours
      vec3 cols[3];
      cols[0] = vec3(0.26, 0.52, 0.96); // Google blue
      cols[1] = vec3(0.0, 0.78, 1.0);    // Meta cyan
      cols[2] = vec3(1.0, 0.8, 0.0);     // Email gold
      int idx = int(aStream);
      vCol = idx == 0 ? cols[0] : (idx == 1 ? cols[1] : cols[2]);
      vAlpha = uActive * 0.7;
    }
  `,
  fragmentShader: `
    varying float vAlpha;
    varying vec3 vCol;
    void main(){
      vec2 c = gl_PointCoord - 0.5;
      // Elongated vertically — data streaks
      float d = length(c * vec2(1.0, 0.3));
      if(d > 0.5) discard;
      gl_FragColor = vec4(vCol, smoothstep(0.5, 0.0, d) * vAlpha);
    }
  `,

const chromaShader = {
  uniforms: { tDiffuse:{value:null}, uStr:{value:0.003} },
  vertexShader: `varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader: `
    uniform sampler2D tDiffuse;uniform float uStr;varying vec2 vUv;
    void main(){
      vec2 d=vUv-0.5;float dist=dot(d,d);float o=uStr*dist;
      gl_FragColor=vec4(
        texture2D(tDiffuse,vUv+d*o).r,
        texture2D(tDiffuse,vUv).g,
        texture2D(tDiffuse,vUv-d*o).b,
        1.0
      );
    }
  `,
};
const chromaPass = new ShaderPass(chromaShader);
composer.addPass(chromaPass);

const vigShader = {
  uniforms: { tDiffuse:{value:null}, uDark:{value:0.55}, uTint:{value:new THREE.Color(0x050010)} },
  vertexShader: `varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader: `
    uniform sampler2D tDiffuse;uniform float uDark;uniform vec3 uTint;varying vec2 vUv;
    void main(){
      vec4 c=texture2D(tDiffuse,vUv);
      vec2 uv=(vUv-0.5)*2.0;
      float v=1.0-dot(uv,uv)*0.4;
      v=clamp(pow(max(v,0.0),uDark),0.0,1.0);
      c.rgb=mix(uTint,c.rgb,v);
      gl_FragColor=c;
    }
  `,
};
composer.addPass(new ShaderPass(vigShader));
composer.addPass(new OutputPass());

   VOICEOVER — Web Speech API (drop-in for ElevenLabs later)
   ═══════════════════════════════════════════════════════════════════════ */
let voice = null;
function loadVoices() {
  const vs = speechSynthesis.getVoices();
  voice = vs.find(v => /Daniel|Google UK Male|Alex|Aaron/i.test(v.name) && /en/i.test(v.lang))
    || vs.find(v => /en-(GB|US)/i.test(v.lang) && !/female/i.test(v.name))
    || vs.find(v => /en/i.test(v.lang)) || vs[0];
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text, rate = 0.9, pitch = 0.8) {
  if (!voice) return;
  const u = new SpeechSynthesisUtterance(text);
  u.voice = voice; u.rate = rate; u.pitch = pitch; u.volume = 1;
  speechSynthesis.speak(u);
}

const TOTAL = 98;

/* ═══════════════════════════════════════════════════════════════════════
   VISUAL STATE + MODE HANDLERS
   ═══════════════════════════════════════════════════════════════════════ */
const vs = {
  morph: 0, fire: 0, converge: 0, emissive: 0,
  emberIntensity: 0.4, emberMorph: 0, emberFire: 0, emberConverge: 0, emberDataMode: 0,
  rainActive: 0,
  bloomStr: 1.2, chromaStr: 0.003,
  camX: 0, camY: 0, camZ: 40, camShake: 0,
  bgR: 0.012, bgG: 0.012, bgB: 0.024,
  humanLightI: 0, aiLightI: 0, fireLightI: 0,
  ringVis: false, ring2Vis: false,
  lockVis: false, qVis: false,
  fieldScale: 1,
};

const mainText = document.getElementById('main-text');
const subText = document.getElementById('sub-text');
const vsEl = document.getElementById('vs');
const hudEl = document.getElementById('hud');
const ctaEl = document.getElementById('cta');
const progFill = document.getElementById('prog-fill');

function bars(gh,ga,mh,ma,eh,ea) {

  document.getElementById('b-g-a').style.width = ga+'%';

}

function resetVS() {
  vs.morph = 0; vs.fire = 0; vs.converge = 0; vs.emissive = 0;
  vs.emberMorph = 0; vs.emberFire = 0; vs.emberConverge = 0; vs.emberDataMode = 0;
  vs.rainActive = 0;
  vs.camShake = 0;
  vs.humanLightI = 0; vs.aiLightI = 0; vs.fireLightI = 0;
  vs.ringVis = false; vs.ring2Vis = false;
  vs.lockVis = false; vs.qVis = false;
  vs.fieldScale = 1;
  vs.bloomStr = 1.2; vs.chromaStr = 0.003;
  vs.bgR = 0.012; vs.bgG = 0.012; vs.bgB = 0.024;
  hudEl.classList.remove('on'); ctaEl.classList.remove('on');
  vsEl.style.opacity = '0';
  lockGrp.visible = false; qGrp.visible = false;
  ringMesh.visible = false; ring2.visible = false;
}

const modes = {
  intro()  { vs.emissive = 0.6; vs.bloomStr = 1.8; vs.camShake = 0.015; vs.emberIntensity = 0.6; },

  ai()     { vs.morph = 0.3; vs.emberMorph = 0.3; vs.aiLightI = 4; vs.camX = 4; },

/* ═══════════════════════════════════════════════════════════════════════
   EXPERIENCE ENGINE
   ═══════════════════════════════════════════════════════════════════════ */
let running = false, startT = 0, curCue = -1;

function fireCue(c) {
  resetVS();
  mainText.innerHTML = c.html;
  mainText.classList.add('on');
  if (c.sub) { subText.textContent = c.sub; subText.classList.add('on'); }
  else subText.classList.remove('on');
  speak(c.say, c.rate, c.pitch);
  if (modes[c.mode]) modes[c.mode]();
  // Fade out near end
  setTimeout(() => { mainText.classList.remove('on'); subText.classList.remove('on'); }, c.d * 1000 - 600);
}

function go() {
  document.getElementById('start').classList.add('off');
  startT = performance.now() / 1000;
  running = true; curCue = -1;
  speechSynthesis.cancel();
}
document.getElementById('start').addEventListener('click', go);

/* ═══════════════════════════════════════════════════════════════════════
   RENDER LOOP
   ═══════════════════════════════════════════════════════════════════════ */
const clock = new THREE.Clock();
const lerp = (a, b, t) => a + (b - a) * t;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = Math.min(clock.getDelta(), 0.05);

  if (running) {
    const el = performance.now() / 1000 - startT;
    progFill.style.width = (Math.min(el / TOTAL, 1) * 100) + '%';
    for (let i = 0; i < cues.length; i++) {
      if (el >= cues[i].t && el < cues[i].t + cues[i].d && i !== curCue) {
        curCue = i;
        fireCue(cues[i]);
      }
    }
    if (el >= TOTAL) { running = false; resetVS(); mainText.classList.remove('on'); }
  }

  const sp = 0.04; // smoothing speed

  // ── Field uniforms ──────────────────────────────────────────────
  fieldUniforms.uTime.value = t;
  fieldUniforms.uMorph.value = lerp(fieldUniforms.uMorph.value, vs.morph, sp);
  fieldUniforms.uFireIntensity.value = lerp(fieldUniforms.uFireIntensity.value, vs.fire, sp);
  fieldUniforms.uConverge.value = lerp(fieldUniforms.uConverge.value, vs.converge, sp);
  fieldUniforms.uEmissive.value = lerp(fieldUniforms.uEmissive.value, vs.emissive, sp);

  // Field scale
  const ts = lerp(field.scale.x, vs.fieldScale, sp);
  field.scale.setScalar(ts);
  field.rotation.y += dt * 0.08;
  field.rotation.x = Math.sin(t * 0.1) * 0.15;

  // ── Ember uniforms ──────────────────────────────────────────────
  emberMat.uniforms.uTime.value = t;
  emberMat.uniforms.uIntensity.value = lerp(emberMat.uniforms.uIntensity.value, vs.emberIntensity, sp);
  emberMat.uniforms.uMorph.value = lerp(emberMat.uniforms.uMorph.value, vs.emberMorph, sp);
  emberMat.uniforms.uFire.value = lerp(emberMat.uniforms.uFire.value, vs.emberFire, sp);
  emberMat.uniforms.uConverge.value = lerp(emberMat.uniforms.uConverge.value, vs.emberConverge, sp);
  emberMat.uniforms.uDataMode.value = lerp(emberMat.uniforms.uDataMode.value, vs.emberDataMode, sp);

  // ── Rain ────────────────────────────────────────────────────────
  rainMat.uniforms.uTime.value = t;
  rainMat.uniforms.uActive.value = lerp(rainMat.uniforms.uActive.value, vs.rainActive, sp);

  // ── Geometric objects ───────────────────────────────────────────
  ringMesh.visible = vs.ringVis;
  ring2.visible = vs.ring2Vis;
  if (ringMesh.visible) { ringMesh.rotation.z += dt * 0.2; ringMat.emissiveIntensity = 0.4 + Math.sin(t * 2) * 0.2; }
  if (ring2.visible) { ring2.rotation.z -= dt * 0.15; }

  lockGrp.visible = vs.lockVis;
  if (lockGrp.visible) {
    lockGrp.rotation.y += dt * 0.4;
    lockGrp.position.y = Math.sin(t * 1.2) * 0.6;
    lockBodyMat.emissiveIntensity = 0.6 + Math.sin(t * 3) * 0.3;
  }

  qGrp.visible = vs.qVis;
  if (qGrp.visible) {
    qGrp.rotation.y += dt * 0.25;
    qGrp.position.y = Math.sin(t * 0.8) * 1.0;
    qGrp.scale.setScalar(1 + Math.sin(t * 1.5) * 0.08);
  }

  // ── Camera ──────────────────────────────────────────────────────
  camera.position.x = lerp(camera.position.x, vs.camX + Math.sin(t * 0.12) * 2, sp);
  camera.position.y = lerp(camera.position.y, vs.camY + Math.sin(t * 0.15) * 1.5, sp);
  camera.position.z = lerp(camera.position.z, vs.camZ + Math.sin(t * 0.1) * 2, sp);
  if (vs.camShake > 0.001) {
    camera.position.x += (Math.random() - 0.5) * vs.camShake * 2;
    camera.position.y += (Math.random() - 0.5) * vs.camShake * 2;
    vs.camShake *= 0.97;
  }
  camera.lookAt(0, 0, 0);

  // ── Lights ──────────────────────────────────────────────────────
  humanLight.intensity = lerp(humanLight.intensity, vs.humanLightI, sp);
  aiLight.intensity = lerp(aiLight.intensity, vs.aiLightI, sp);
  fireLight.intensity = lerp(fireLight.intensity, vs.fireLightI, sp);

  // ── Background ──────────────────────────────────────────────────
  scene.background.r = lerp(scene.background.r, vs.bgR, sp);
  scene.background.g = lerp(scene.background.g, vs.bgG, sp);
  scene.background.b = lerp(scene.background.b, vs.bgB, sp);

  // ── Post-processing ────────────────────────────────────────────
  bloom.strength = lerp(bloom.strength, vs.bloomStr, sp);
  chromaPass.uniforms.uStr.value = lerp(chromaPass.uniforms.uStr.value, vs.chromaStr, sp);

  composer.render();
}
animate();
