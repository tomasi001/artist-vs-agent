<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Artist vs Agent — Day 6</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;600;800;900&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --f:'Inter',system-ui,sans-serif;
  --m:'JetBrains Mono',monospace;
  --human:#ff1a5e;--ai:#00d4ff;--fire:#ff3300;--gold:#ffbb00;
}
html,body{font-family:var(--f);background:#000;color:#fff;overflow:hidden;width:100%;height:100%;-webkit-font-smoothing:antialiased}

/* ═══ 9:16 FRAME — all content lives inside this ═══ */
#frame{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  overflow:hidden;background:#020204;
}
canvas#gl{position:absolute;inset:0;width:100%;height:100%}

/* Text overlay */
#txt{
  position:absolute;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;pointer-events:none;padding:0 6vw;
}
#t{
  font-weight:100;font-size:clamp(2rem,8vw,5.5rem);
  line-height:1.0;letter-spacing:-0.05em;text-align:center;
  opacity:0;transform:scale(0.92);
  transition:opacity 0.25s ease,transform 0.25s ease;
  mix-blend-mode:difference;
}
#t.on{opacity:1;transform:scale(1)}
#t.punch{transition:none;animation:punch 0.3s ease-out}
@keyframes punch{0%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:1}}
#t .h{color:var(--human)}
#t .a{color:var(--ai)}
#t .f{color:var(--fire)}
#t .g{color:var(--gold)}
#t .b{font-weight:900}
#t .i{font-style:italic;font-weight:200;opacity:0.7}
#t .mono{font-family:var(--m);letter-spacing:0.04em}
#sub{
  font-weight:300;font-size:clamp(0.7rem,2vw,1rem);
  color:rgba(255,255,255,0.3);margin-top:8px;text-align:center;
  opacity:0;transition:opacity 0.3s ease 0.1s;letter-spacing:0.03em;
}
#sub.on{opacity:1}

/* VS flash */
#vs{
  position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
  background:radial-gradient(circle,rgba(255,26,94,0.15),transparent 70%);
}
#vs span{
  font-family:var(--m);font-weight:900;font-size:clamp(8rem,30vw,18rem);
  background:linear-gradient(135deg,var(--human),var(--fire));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 80px rgba(255,26,94,0.7));
}

/* HUD */
#hud{
  position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
  z-index:12;pointer-events:none;display:flex;gap:20px;
  opacity:0;transition:opacity 0.3s ease;
}
#hud.on{opacity:1}
.ch{text-align:center}
.ch-n{font-family:var(--m);font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:6px}
.br{width:60px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin:2px 0}
.br-i{height:100%;border-radius:2px;width:0%;transition:width 0.8s cubic-bezier(.22,1,.36,1)}
.br-i.h{background:var(--human)}.br-i.ai{background:var(--ai)}

/* CTA */
#cta{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);z-index:14;text-align:center;opacity:0;transition:opacity 0.4s ease;pointer-events:auto}
#cta.on{opacity:1}
#cta p{font-weight:300;font-size:0.8rem;color:rgba(255,255,255,0.4);margin-bottom:10px}
#cta button{background:none;border:1px solid var(--ai);color:var(--ai);padding:8px 24px;border-radius:3px;font-family:var(--f);font-size:11px;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
#cta button:hover{background:var(--ai);color:#020204}

/* Progress */
#prog{position:absolute;bottom:0;left:0;width:100%;height:2px;z-index:20;background:rgba(255,255,255,0.02)}
#prog-f{height:100%;width:0%;background:linear-gradient(90deg,var(--human),var(--ai));transition:width 0.15s linear}

/* Start */
#go{position:absolute;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#020204;cursor:pointer;transition:opacity 0.5s}
#go.off{opacity:0;pointer-events:none}
#go .day{font-family:var(--m);font-weight:700;font-size:10px;color:var(--fire);letter-spacing:0.25em;text-transform:uppercase;margin-bottom:8px}
#go h1{font-weight:100;font-size:clamp(1.8rem,6vw,3.5rem);letter-spacing:-0.04em}
#go .p{font-weight:300;font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:0.12em;text-transform:uppercase;margin-top:14px;animation:br 2s ease-in-out infinite}
@keyframes br{0%,100%{opacity:0.25}50%{opacity:0.7}}

/* Replay */
#replay{position:absolute;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;flex-direction:column;pointer-events:none;opacity:0;transition:opacity 0.5s}
#replay.on{opacity:1;pointer-events:auto}
#replay button{background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);padding:10px 28px;border-radius:3px;font-family:var(--f);font-size:11px;font-weight:300;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:12px}
#replay button:hover{border-color:var(--ai);color:var(--ai)}
#replay .end{font-weight:100;font-size:clamp(1.2rem,4vw,2.4rem);letter-spacing:-0.03em;text-align:center;opacity:0.5}
</style>
</head>
<body>
<div id="frame">
<canvas id="gl"></canvas>
<div id="go"><div class="day">Day 6</div><h1>Artist vs Agent</h1><div class="p">Tap to begin</div></div>
<div id="txt"><div id="t"></div><div id="sub"></div></div>
<div id="vs"><span>VS</span></div>
<div id="hud">
  <div class="ch"><div class="ch-n">Google</div><div class="br"><div class="br-i h" id="gh"></div></div><div class="br"><div class="br-i ai" id="ga"></div></div></div>
  <div class="ch"><div class="ch-n">Meta</div><div class="br"><div class="br-i h" id="mh"></div></div><div class="br"><div class="br-i ai" id="ma"></div></div></div>
  <div class="ch"><div class="ch-n">Email</div><div class="br"><div class="br-i h" id="eh"></div></div><div class="br"><div class="br-i ai" id="ea"></div></div></div>
</div>
<div id="cta"><p>What metrics prove a brand is actually working?</p><button>Comment your thoughts</button></div>
<div id="replay"><div class="end">The future has no screen.</div><button id="replayBtn">Watch Again</button></div>
<div id="prog"><div id="prog-f"></div></div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';
import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';
import{ShaderPass}from'three/addons/postprocessing/ShaderPass.js';
import{OutputPass}from'three/addons/postprocessing/OutputPass.js';

console.log('[AvA] Module loaded — Three.js r183');

const isMobile=navigator.maxTouchPoints>0;
const dpr=Math.min(devicePixelRatio,isMobile?1.5:2);
const GEO_DETAIL=isMobile?32:48;
const P_COUNT=isMobile?5000:8000;
const frame=document.getElementById('frame');

/* ═══ 9:16 SIZING ═══ */
function getFrameSize(){
  const vw=innerWidth,vh=innerHeight,ratio=9/16;
  let w,h;
  if(vw/vh>ratio){h=vh;w=Math.floor(h*ratio);}
  else{w=vw;h=Math.floor(w/ratio);}
  if(h>vh){h=vh;w=Math.floor(h*ratio);}
  return{w,h};
}

try{

/* ═══ RENDERER ═══ */
const cv=document.getElementById('gl');
const R=new THREE.WebGLRenderer({canvas:cv,antialias:true,powerPreference:'high-performance'});
R.setPixelRatio(dpr);
R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.1;
R.outputColorSpace=THREE.SRGBColorSpace;

const S=new THREE.Scene();
S.background=new THREE.Color(0x020204);
const cam=new THREE.PerspectiveCamera(60,9/16,0.1,500);
cam.position.set(0,0,18);

const{w:fw,h:fh}=getFrameSize();
frame.style.width=fw+'px';frame.style.height=fh+'px';
R.setSize(fw,fh);

/* ═══ ORGANISM — VERTEX SHADER ═══
   Domain-warped 5-octave FBM with per-mode deformations.
   This creates flowing, organic displacement — not "a sphere with noise on it".
*/
const ORG_V=`
uniform float uTime,uMorph,uFire,uConverge,uExplode,uPulse,uScale,uDataVis;
varying vec3 vN,vW;varying float vFr,vNoise,vSide,vDisp;

vec3 mod289v3(vec3 x){return x-floor(x/289.0)*289.0;}
vec4 mod289v4(vec4 x){return x-floor(x/289.0)*289.0;}
vec4 perm(vec4 x){return mod289v4(((x*34.0)+1.0)*x);}
float n3(vec3 p){
  vec3 a=floor(p),d=p-a;d*=d*(3.0-2.0*d);
  vec4 b=a.xxyy+vec4(0,1,0,1),k1=perm(b.xyxy),k2=perm(k1.xyxy+b.zzww);
  vec4 c=k2+a.zzzz,k3=perm(c),k4=perm(c+1.0);
  vec4 o1=fract(k3/41.0),o2=fract(k4/41.0),o3=o2*d.z+o1*(1.0-d.z);
  vec2 o4=o3.yw*d.x+o3.xz*(1.0-d.x);
  return o4.y*d.y+o4.x*(1.0-d.y);
}
float fbm5(vec3 p){float v=0.0,a=0.5;for(int i=0;i<5;i++){v+=a*n3(p);p=p*2.1+vec3(1.7,9.2,4.1);a*=0.5;}return v;}
float fbm3(vec3 p){float v=0.0,a=0.5;for(int i=0;i<3;i++){v+=a*n3(p);p=p*2.1+vec3(1.7,9.2,4.1);a*=0.5;}return v;}

void main(){
  vec3 pos=position*uScale;

  // Domain warping — feeds noise back as position offset for organic flow
  vec3 q=vec3(
    fbm3(pos*1.2+vec3(0.0,0.0,uTime*0.1)),
    fbm3(pos*1.2+vec3(5.2,1.3,uTime*0.12)),
    fbm3(pos*1.2+vec3(3.7,8.1,uTime*0.08))
  );
  vec3 warped=pos+q*0.8;

  float n=fbm5(warped*1.3+uTime*0.15)*2.0-1.0;
  float n2=fbm5(warped*2.5+uTime*0.3+99.0)*2.0-1.0;
  vNoise=n;vSide=pos.x;

  float disp=n*2.0+n2*0.8;

  // Morph: rip into hemispheres
  float side=sign(pos.x+0.001);
  float morphPush=side*uMorph*5.0;
  disp+=uMorph*n2*2.0*side;

  // Fire: violent eruption with directional tendrils
  float fireBase=n2*5.0+sin(uTime*7.0+pos.y*4.0)*3.0;
  float tendril=max(0.0,sin(uTime*5.0+pos.x*6.0))*4.0*smoothstep(-1.0,3.0,pos.y);
  float fireDisp=uFire*(fireBase+tendril);

  // Explode
  float explodeDisp=uExplode*(n*10.0+2.0);

  // Pulse
  float pulse=uPulse*sin(uTime*10.0)*0.6;

  // Converge
  float conv=uConverge*(-length(pos)*0.4);

  // Data: quantise to geometric facets
  float dataQ=uDataVis*(floor(n*6.0)/6.0-n)*1.5;

  vec3 displaced=pos+normal*(disp+fireDisp+explodeDisp+pulse+conv+dataQ);
  displaced.x+=morphPush;

  vDisp=length(displaced-pos);
  vW=(modelMatrix*vec4(displaced,1.0)).xyz;
  vN=normalize(normalMatrix*(normal+vec3(n*0.3,n2*0.3,n*0.2)));
  vec3 viewDir=normalize(cameraPosition-vW);
  vFr=pow(1.0-max(dot(viewDir,vN),0.0),2.2);

  gl_Position=projectionMatrix*modelViewMatrix*vec4(displaced,1.0);
}`;

/* ═══ ORGANISM — FRAGMENT SHADER ═══ */
const ORG_F=`
uniform float uTime,uMorph,uFire,uConverge,uEmissive,uDataVis,uColorTemp;
uniform vec3 uHCol,uACol,uFCol;
varying vec3 vN,vW;varying float vFr,vNoise,vSide,vDisp;

void main(){
  float side=smoothstep(-3.0,3.0,vSide);
  vec3 base=mix(uHCol,uACol,side);

  // Fire: incandescent heat gradient (dark red → orange → yellow → white)
  if(uFire>0.01){
    float heat=vDisp*0.12*uFire;
    vec3 fc=mix(vec3(0.5,0.0,0.0),vec3(1.0,0.4,0.0),clamp(heat,0.0,1.0));
    fc=mix(fc,vec3(1.0,0.9,0.5),clamp(heat-1.0,0.0,1.0));
    base=mix(base,fc,uFire*(0.5+vFr*0.5));
  }

  // Data: animated circuit traces
  if(uDataVis>0.01){
    float grid=step(0.46,fract(vW.x*2.5))+step(0.46,fract(vW.y*2.5));
    float pulse=smoothstep(0.85,1.0,fract(vW.y*6.0-uTime*3.0));
    float pulse2=smoothstep(0.85,1.0,fract(vW.x*4.0+uTime*2.0));
    vec3 dc=vec3(0.0,0.85,1.0);
    base=mix(base,dc,uDataVis*grid*0.4);
    base+=dc*(pulse+pulse2)*uDataVis*0.3;
  }

  // Lighting
  vec3 L=normalize(vec3(0.5,1.0,0.8));
  float diff=max(dot(vN,L),0.0)*0.5+0.5;
  float spec=pow(max(dot(reflect(-L,vN),normalize(cameraPosition-vW)),0.0),48.0);
  float sss=pow(max(dot(-vN,L),0.0),1.5)*0.5;

  // Rim — strong, mode-reactive
  vec3 rimCol=mix(uHCol,uACol,side)*2.5;
  rimCol=mix(rimCol,uFCol*4.0,uFire);
  rimCol=mix(rimCol,vec3(0.0,1.0,1.2),uDataVis*0.5);

  vec3 col=base*diff+rimCol*vFr+base*sss+vec3(1.0)*spec*0.35;

  // Emissive core glow
  float emP=sin(uTime*5.0+vW.y*8.0)*0.5+0.5;
  col+=base*uEmissive*emP*0.7;

  // Fire incandescence on edges
  col+=uFCol*uFire*vFr*4.0;
  col+=vec3(1.0,0.6,0.1)*uFire*pow(vFr,1.5)*3.0;

  // Colour temperature shift across narrative
  float warm=clamp(-uColorTemp,0.0,1.0);
  float cool=clamp(uColorTemp,0.0,1.0);
  col*=mix(vec3(1.0),vec3(1.15,1.0,0.85),warm);
  col*=mix(vec3(1.0),vec3(0.85,0.95,1.15),cool);

  gl_FragColor=vec4(col,1.0);
}`;

const orgU={
  uTime:{value:0},uMorph:{value:0},uFire:{value:0},
  uConverge:{value:0},uExplode:{value:0},uPulse:{value:0},
  uEmissive:{value:0},uScale:{value:1},uDataVis:{value:0},
  uColorTemp:{value:0},
  uHCol:{value:new THREE.Color(0xff1a5e)},
  uACol:{value:new THREE.Color(0x00d4ff)},
  uFCol:{value:new THREE.Color(0xff3300)},
};

const org=new THREE.Mesh(
  new THREE.IcosahedronGeometry(5,GEO_DETAIL),
  new THREE.ShaderMaterial({uniforms:orgU,vertexShader:ORG_V,fragmentShader:ORG_F,side:THREE.DoubleSide})
);
S.add(org);

/* ═══ PARTICLES ═══ */
const eG=new THREE.BufferGeometry();
const eP=new Float32Array(P_COUNT*3),ePh=new Float32Array(P_COUNT),eSz=new Float32Array(P_COUNT),eSd=new Float32Array(P_COUNT);
for(let i=0;i<P_COUNT;i++){
  const th=Math.random()*Math.PI*2,ph=Math.acos(Math.random()*2-1);
  const r=5+Math.random()*12;
  eP[i*3]=r*Math.sin(ph)*Math.cos(th);eP[i*3+1]=r*Math.sin(ph)*Math.sin(th);eP[i*3+2]=r*Math.cos(ph);
  ePh[i]=Math.random()*6.28;eSz[i]=0.5+Math.random()*2.2;
  eSd[i]=i<P_COUNT/3?-1:(i<P_COUNT*2/3?1:0);
}
eG.setAttribute('position',new THREE.BufferAttribute(eP,3));
eG.setAttribute('aP',new THREE.BufferAttribute(ePh,1));
eG.setAttribute('aS',new THREE.BufferAttribute(eSz,1));
eG.setAttribute('aSd',new THREE.BufferAttribute(eSd,1));

const eM=new THREE.ShaderMaterial({
  uniforms:{
    uTime:{value:0},uInt:{value:0.5},uMorph:{value:0},uFire:{value:0},
    uConv:{value:0},uData:{value:0},uOrbit:{value:0.5},
  },
  vertexShader:`
    attribute float aP,aS,aSd;
    uniform float uTime,uInt,uMorph,uFire,uConv,uData,uOrbit;
    varying vec3 vC;varying float vA;
    void main(){
      vec3 p=position;
      float angle=uTime*uOrbit*0.3+aP;
      float r=length(p.xz);
      p.x=cos(angle)*r;p.z=sin(angle)*r;
      p+=normalize(p)*sin(uTime*0.5+aP)*1.5;
      p.x+=aSd*uMorph*8.0;
      if(uFire>0.01){
        p.y+=sin(uTime*6.0+aP*4.0)*uFire*8.0;
        p.x+=cos(uTime*5.0+aP*3.0)*uFire*4.0;
        p.z+=sin(uTime*4.0+aP*2.0)*uFire*3.0;
      }
      if(uData>0.01){
        float col=floor(aP*5.0/6.28);
        float colX=(col-2.0)*6.0+sin(aP*3.0)*1.5;
        float fallSpd=8.0+aP*4.0;
        float y=mod(p.y-uTime*fallSpd+aP*20.0,40.0)-20.0;
        p.x=mix(p.x,colX,uData);
        p.y=mix(p.y,y,uData);
        p.z=mix(p.z,sin(aP)*3.0,uData);
      }
      p=mix(p,vec3(0),uConv*0.7);
      vec4 mv=modelViewMatrix*vec4(p,1.0);
      gl_PointSize=aS*uInt*(250.0/-mv.z);
      gl_Position=projectionMatrix*mv;
      vec3 hC=vec3(1.0,0.1,0.37),aC=vec3(0.0,0.83,1.0),fC=vec3(1.0,0.2,0.0);
      vC=aSd<-0.5?hC:(aSd>0.5?aC:mix(hC,aC,0.5));
      vC=mix(vC,fC,uFire*0.8);
      vA=uInt*(0.4+sin(uTime*0.6+aP)*0.3)*smoothstep(30.0,3.0,length(p));
    }
  `,
  fragmentShader:`
    varying vec3 vC;varying float vA;
    void main(){
      float d=length(gl_PointCoord-0.5);if(d>0.5)discard;
      gl_FragColor=vec4(vC,smoothstep(0.5,0.0,d)*vA*0.9);
    }
  `,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
});
S.add(new THREE.Points(eG,eM));

/* ═══ LOCK ═══ */
const lockG=new THREE.Group();
const lkM=new THREE.MeshStandardMaterial({color:0xff2200,emissive:0xff1100,emissiveIntensity:0.8,metalness:0.95,roughness:0.1});
const lockBody=new THREE.Mesh(new THREE.BoxGeometry(4,5,1.5,4,4,2),lkM);
lockG.add(lockBody);
const khM=new THREE.MeshStandardMaterial({color:0x020204,emissive:0x000000,metalness:0,roughness:1});
const kh=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,1.6,16),khM);
kh.rotation.x=Math.PI/2;kh.position.set(0,-0.2,0);lockBody.add(kh);
const ks=new THREE.Mesh(new THREE.BoxGeometry(0.3,1.5,1.6),khM);
ks.position.set(0,-1.2,0);lockBody.add(ks);
const shM=new THREE.MeshStandardMaterial({color:0xcc3300,emissive:0x991100,emissiveIntensity:0.5,metalness:0.95,roughness:0.08});
const shackle=new THREE.Mesh(new THREE.TorusGeometry(1.8,0.4,12,24,Math.PI),shM);
shackle.position.set(0,2.5,0);
lockG.add(shackle);
lockG.position.z=5;lockG.visible=false;
S.add(lockG);

/* ═══ LIGHTING ═══ */
S.add(new THREE.AmbientLight(0x080818,0.35));
const dL=new THREE.DirectionalLight(0xffffff,0.5);dL.position.set(5,10,8);S.add(dL);
const hL=new THREE.PointLight(0xff1a5e,0,60);hL.position.set(-15,0,8);S.add(hL);
const aL=new THREE.PointLight(0x00d4ff,0,60);aL.position.set(15,0,8);S.add(aL);
const fL=new THREE.PointLight(0xff3300,0,50);fL.position.set(0,-3,12);S.add(fL);

/* ═══ POST-PROCESSING ═══
   Combined cinematic pass: chromatic aberration + vignette + film grain
   Single draw call instead of three separate passes — critical for mobile GPU budget.
*/
const comp=new EffectComposer(R);
comp.addPass(new RenderPass(S,cam));
const bloom=new UnrealBloomPass(new THREE.Vector2(fw,fh),1.5,0.4,0.7);
comp.addPass(bloom);

const cinematicShader={
  uniforms:{
    tDiffuse:{value:null},
    uChroma:{value:0.003},
    uTime:{value:0},
    uGrain:{value:0.06},
    uVigD:{value:0.5},
    uVigTint:{value:new THREE.Color(0x030008)},
  },
  vertexShader:`varying vec2 v;void main(){v=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`
    uniform sampler2D tDiffuse;uniform float uChroma,uTime,uGrain,uVigD;uniform vec3 uVigTint;
    varying vec2 v;
    float hash12(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453);}
    void main(){
      vec2 d=v-0.5;float l=dot(d,d);
      float o=uChroma*l;
      float r=texture2D(tDiffuse,v+d*o).r;
      float g=texture2D(tDiffuse,v).g;
      float b=texture2D(tDiffuse,v-d*o).b;
      vec3 col=vec3(r,g,b);
      float vig=1.0-l*0.4;
      col=mix(uVigTint,col,clamp(pow(max(vig,0.0),uVigD),0.0,1.0));
      float grain=(hash12(v*vec2(uTime*97.0,uTime*53.0))-0.5)*uGrain;
      col+=grain;
      gl_FragColor=vec4(col,1.0);
    }
  `,
};
const cinPass=new ShaderPass(cinematicShader);
comp.addPass(cinPass);
comp.addPass(new OutputPass());

speechSynthesis.onvoiceschanged=loadV;loadV();
function say(txt,rate=0.9,pitch=0.8){
  speechSynthesis.cancel(); // Prevent audio pileup
  if(!vc)return;
  const u=new SpeechSynthesisUtterance(txt);u.voice=vc;u.rate=rate;u.pitch=pitch;u.volume=1;speechSynthesis.speak(u);
}

/* ═══ ENGINE ═══ */
let run=false,t0=0,cur=-1;
function fireCue(c){
  rst();
  tE.innerHTML=c.html;tE.classList.add('on');
  if(c.sub){sE.textContent=c.sub;sE.classList.add('on');}else sE.classList.remove('on');
  say(c.say,c.r,c.p);
  if(M[c.m])M[c.m]();
  setTimeout(()=>{tE.classList.remove('on');sE.classList.remove('on');},c.d*1000-400);
}

function startSequence(){
  document.getElementById('go').classList.add('off');
  replayE.classList.remove('on');
  t0=performance.now()/1000;run=true;cur=-1;
  speechSynthesis.cancel();
}
document.getElementById('go').addEventListener('click',startSequence);
document.getElementById('replayBtn').addEventListener('click',startSequence);

/* ═══ RENDER LOOP ═══ */
let _pt=0,_et=0;
const lp=(a,b,t)=>a+(b-a)*t;

function anim(ts){
  requestAnimationFrame(anim);
  const dt=_pt?Math.min((ts-_pt)/1000,.05):0;
  _pt=ts;_et+=dt;
  const t=_et;
  const sp=.06;

  if(run){
    const el=performance.now()/1000-t0;
    pF.style.width=(Math.min(el/TOTAL,1)*100)+'%';
    for(let i=0;i<Q.length;i++){
      if(el>=Q[i].t&&el<Q[i].t+Q[i].d&&i!==cur){cur=i;fireCue(Q[i]);}
    }
    if(el>=TOTAL){
      run=false;rst();tE.classList.remove('on');sE.classList.remove('on');
      speechSynthesis.cancel();
      replayE.classList.add('on');
    }
  }

  // Organism
  orgU.uTime.value=t;
  orgU.uMorph.value=lp(orgU.uMorph.value,v.morph,sp);
  orgU.uFire.value=lp(orgU.uFire.value,v.fire,sp);
  orgU.uConverge.value=lp(orgU.uConverge.value,v.conv,sp);
  orgU.uExplode.value=lp(orgU.uExplode.value,v.explode,sp);
  orgU.uPulse.value=lp(orgU.uPulse.value,v.pulse,sp);
  orgU.uEmissive.value=lp(orgU.uEmissive.value,v.emissive,sp);
  orgU.uScale.value=lp(orgU.uScale.value,v.scale,sp);
  orgU.uDataVis.value=lp(orgU.uDataVis.value,v.dataVis,sp);
  orgU.uColorTemp.value=lp(orgU.uColorTemp.value,v.colorTemp,sp);

  org.rotation.y+=dt*0.12;
  org.rotation.x=Math.sin(t*0.08)*0.1;

  // Embers
  eM.uniforms.uTime.value=t;
  eM.uniforms.uInt.value=lp(eM.uniforms.uInt.value,v.eInt,sp);
  eM.uniforms.uMorph.value=lp(eM.uniforms.uMorph.value,v.eMorph,sp);
  eM.uniforms.uFire.value=lp(eM.uniforms.uFire.value,v.eFire,sp);
  eM.uniforms.uConv.value=lp(eM.uniforms.uConv.value,v.eConv,sp);
  eM.uniforms.uData.value=lp(eM.uniforms.uData.value,v.eData,sp);
  eM.uniforms.uOrbit.value=lp(eM.uniforms.uOrbit.value,v.eOrbit,sp);

  // Lock
  lockG.visible=v.lockVis;
  if(lockG.visible){
    lockG.rotation.y+=dt*0.5;
    lockG.position.y=Math.sin(t*1.5)*0.8;
    lkM.emissiveIntensity=0.8+Math.sin(t*4)*0.4;
  }

  // Camera
  cam.position.x=lp(cam.position.x,v.camX+Math.sin(t*0.15)*1.2,sp);
  cam.position.y=lp(cam.position.y,v.camY+Math.sin(t*0.18)*0.8,sp);
  cam.position.z=lp(cam.position.z,v.camZ,sp);
  if(v.camShake>.001){
    cam.position.x+=(Math.random()-.5)*v.camShake*3;
    cam.position.y+=(Math.random()-.5)*v.camShake*3;
    v.camShake*=0.96;
  }
  cam.lookAt(0,0,0);

  // Lights
  hL.intensity=lp(hL.intensity,v.hL,sp);
  aL.intensity=lp(aL.intensity,v.aL,sp);
  fL.intensity=lp(fL.intensity,v.fL,sp);

  // Background
  S.background.lerp(v.bgCol,sp);

  // Post-processing
  bloom.strength=lp(bloom.strength,v.bloom,sp);
  cinPass.uniforms.uChroma.value=lp(cinPass.uniforms.uChroma.value,v.chroma,sp);
  cinPass.uniforms.uGrain.value=lp(cinPass.uniforms.uGrain.value,v.grain,sp);
  cinPass.uniforms.uTime.value=t;

  comp.render();
}
